<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Web3 - Login</title>
  <link rel="icon" type="image/png" href="assets/nftweb3-favicon.png" />
  <link rel="shortcut icon" href="assets/nftweb3-favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="pageLoader" class="page-loader">
    <div class="brand-loader-box">
      <img src="assets/nftweb3-logo.png" alt="NFT Web3" class="brand-loader-logo" />
      <div class="brand-loader-bar">
        <span></span>
      </div>
      <p>Loading NFT Web3...</p>
    </div>
  </div>

  <div class="animated-grid"></div>
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <header class="navbar">
    <a href="index.html" class="logo logo-wrap">
      <img src="assets/nftweb3-logo.png" alt="NFT Web3" class="site-logo" />
    </a>

    <nav class="nav-links" id="mainNav">
      <a href="index.html">Home</a>
      <a href="explore.html">Explore</a>
    </nav>

    <div id="authButtons" style="display:flex; gap:12px; flex-wrap:wrap;"></div>
  </header>

  <section class="section center-section fade-up fade-delay-2">
    <div class="connect-box glass-box">
      <span class="badge">WELCOME BACK</span>
      <h1>Login</h1>
      <p>Access your NFT Web3 account.</p>

      <form class="auth-form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="primary-btn big-btn">Login</button>
      </form>

      <p class="form-message" id="loginMessage"></p>
    </div>
  </section>

  <footer class="footer">
    <div>
      <h3>NFT Web3</h3>
      <p>Admin-curated holdable NFTs with deposit confirmation.</p>
    </div>
    <p>© 2026 NFT Web3. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
